<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OTPKey - 一次性密码生成器</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/otpauth@9.3.4/dist/otpauth.umd.min.js"></script>
</head>
<body>
  <div class="container">
    <header>
      <h1>OTPKey</h1>
      <p class="subtitle">一次性密码生成器</p>
    </header>

    <div class="actions">
      <button class="btn btn-primary" id="addBtn">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
        添加账户
      </button>
      <button class="btn btn-secondary" id="exportBtn">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
        导出
      </button>
      <button class="btn btn-secondary" id="importBtn">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg>
        导入
      </button>
    </div>

    <div class="card-list" id="cardList">
      <!-- 账户卡片将在这里动态生成 -->
    </div>

    <div class="empty-state" id="emptyState">
      <svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
      <p>暂无账户</p>
      <p class="hint">点击上方「添加账户」开始使用</p>
    </div>
  </div>

  <!-- 添加账户弹窗 -->
  <div class="modal" id="addModal">
    <div class="modal-content">
      <div class="modal-header">
        <h2>添加账户</h2>
        <button class="close-btn" id="closeAddModal">&times;</button>
      </div>
      <form id="addForm">
        <div class="form-group">
          <label for="issuer">服务提供商 (Issuer)</label>
          <input type="text" id="issuer" placeholder="例如：Aliyun" required>
        </div>
        <div class="form-group">
          <label for="account">账户 (Account)</label>
          <input type="text" id="account" placeholder="例如：wumeng@123456" required>
        </div>
        <div class="form-group">
          <label for="secretKey">密钥 (Secret / Base32)</label>
          <input type="text" id="secretKey" placeholder="例如：JBSWY3DPEHPK3PXP" required>
          <p class="form-hint">从你的账户设置中获取密钥</p>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label for="mode">模式</label>
            <select id="mode">
              <option value="totp" selected>Time-based OTP (TOTP)</option>
              <option value="hotp">Counter-based OTP (HOTP)</option>
            </select>
          </div>
          <div class="form-group">
            <label for="algorithm">算法</label>
            <select id="algorithm">
              <option value="SHA1" selected>SHA-1</option>
              <option value="SHA256">SHA-256</option>
              <option value="SHA512">SHA-512</option>
            </select>
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label for="digits">位数</label>
            <select id="digits">
              <option value="6" selected>6</option>
              <option value="7">7</option>
              <option value="8">8</option>
            </select>
          </div>
          <div class="form-group">
            <label for="period">周期 (秒)</label>
            <select id="period">
              <option value="30" selected>30</option>
              <option value="60">60</option>
            </select>
          </div>
        </div>
        <div class="form-actions">
          <button type="button" class="btn btn-secondary" id="cancelAdd">取消</button>
          <button type="submit" class="btn btn-primary">添加</button>
        </div>
      </form>
    </div>
  </div>

  <!-- 编辑账户弹窗 -->
  <div class="modal" id="editModal">
    <div class="modal-content">
      <div class="modal-header">
        <h2>编辑账户</h2>
        <button class="close-btn" id="closeEditModal">&times;</button>
      </div>
      <form id="editForm">
        <input type="hidden" id="editId">
        <div class="form-group">
          <label for="editIssuer">服务提供商</label>
          <input type="text" id="editIssuer" required>
        </div>
        <div class="form-group">
          <label for="editAccount">账户</label>
          <input type="text" id="editAccount" required>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label for="editMode">模式</label>
            <select id="editMode">
              <option value="totp">TOTP</option>
              <option value="hotp">HOTP</option>
            </select>
          </div>
          <div class="form-group">
            <label for="editAlgorithm">算法</label>
            <select id="editAlgorithm">
              <option value="SHA1">SHA-1</option>
              <option value="SHA256">SHA-256</option>
              <option value="SHA512">SHA-512</option>
            </select>
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label for="editDigits">位数</label>
            <select id="editDigits">
              <option value="6">6</option>
              <option value="7">7</option>
              <option value="8">8</option>
            </select>
          </div>
          <div class="form-group">
            <label for="editPeriod">周期 (秒)</label>
            <select id="editPeriod">
              <option value="30">30</option>
              <option value="60">60</option>
            </select>
          </div>
        </div>
        <div class="form-actions">
          <button type="button" class="btn btn-secondary" id="cancelEdit">取消</button>
          <button type="submit" class="btn btn-primary">保存</button>
        </div>
      </form>
    </div>
  </div>

  <!-- 导出弹窗 -->
  <div class="modal" id="exportModal">
    <div class="modal-content">
      <div class="modal-header">
        <h2>导出备份</h2>
        <button class="close-btn" id="closeExportModal">&times;</button>
      </div>
      <form id="exportForm">
        <div class="form-group">
          <label for="exportPassword">加密密码</label>
          <input type="password" id="exportPassword" placeholder="设置备份密码" required>
        </div>
        <div class="form-group">
          <label for="exportPassword2">确认密码</label>
          <input type="password" id="exportPassword2" placeholder="再次输入密码" required>
        </div>
        <div class="form-actions">
          <button type="button" class="btn btn-secondary" id="cancelExport">取消</button>
          <button type="submit" class="btn btn-primary">导出</button>
        </div>
      </form>
    </div>
  </div>

  <!-- 导入弹窗 -->
  <div class="modal" id="importModal">
    <div class="modal-content">
      <div class="modal-header">
        <h2>导入备份</h2>
        <button class="close-btn" id="closeImportModal">&times;</button>
      </div>
      <form id="importForm">
        <div class="form-group">
          <label for="importPassword">解密密码</label>
          <input type="password" id="importPassword" placeholder="输入备份时的密码" required>
        </div>
        <div class="form-group">
          <label for="importFile">选择文件</label>
          <input type="file" id="importFile" accept=".json,.otpkey.json" required>
        </div>
        <div class="form-actions">
          <button type="button" class="btn btn-secondary" id="cancelImport">取消</button>
          <button type="submit" class="btn btn-primary">导入</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Toast 提示 -->
  <div class="toast" id="toast"></div>

  <script src="app.js"></script>
</body>
</html>
